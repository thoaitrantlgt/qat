seed: 42

dataset:
  name: cifar100
  root: data
  download: True
  val_split: 0

model:
  name: resnet32

qat:
  weight_bits: 4
  activation_bits: 8
  first_last_bits: 8
  warmup_epochs: 5

training:
  epochs: 100
  batch_size: 128
  num_workers: 0
  device: auto
  log_interval: 100

optimizer:
  name: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: cosine

output:
  checkpoint: outputs/checkpoints/resnet32_cifar100_qat_w4a8_best.pt
  log: outputs/logs/qat_cifar100_resnet32_w4a8.json

