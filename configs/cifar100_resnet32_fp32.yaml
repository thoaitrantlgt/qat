seed: 42

dataset:
  name: cifar100
  root: data
  download: false
  val_split: 0

model:
  name: resnet32

training:
  epochs: 200
  batch_size: 128
  num_workers: 0
  device: auto
  log_interval: 100

optimizer:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: cosine

output:
  checkpoint: outputs/checkpoints/resnet32_cifar100_fp32_best.pt
  log: outputs/logs/fp32_cifar100_resnet32.json
