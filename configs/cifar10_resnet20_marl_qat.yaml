seed: 42

dataset:
  name: cifar10
  root: data
  download: true
  val_split: 0

model:
  name: resnet20

qat:
  weight_bits: 8
  activation_bits: 8
  first_last_bits: 8

marl:
  weight_bit_choices: [3, 4, 5, 6, 7, 8]
  activation_bit_choices: [3, 4, 5, 6, 7, 8]
  warmup_epochs: 20
  warmup_weight_bits: 8
  warmup_activation_bits: 8
  policy_interval: 100
  policy_lr: 0.0002
  actor_hidden_dim: 128
  entropy_beta: 0.0005
  lambda_bitops: 0.05
  lambda_local: 0.005
  lambda_accuracy_drop: 3.0
  reward_smoothing_alpha: 0.5
  val_subset_size: 2048
  bitops_budget_ratio: 0.25
  static_finetune_epochs: 0

training:
  epochs: 100
  batch_size: 512
  num_workers: 8
  device: cuda
  log_interval: 100
  grad_clip: 5.0

optimizer:
  name: sgd
  lr: 0.0005
  momentum: 0.9
  weight_decay: 0.0005
  quantizer_lr_multiplier: 0.1
  quantizer_weight_decay: 0.0
  nesterov: false

scheduler:
  name: cosine

output:
  checkpoint: outputs/checkpoints/resnet20_cifar10_marl_qat_best.pt
  policy: outputs/policies/resnet20_cifar10_marl_qat_policy.json
  log: outputs/logs/marl_qat_cifar10_resnet20.json
