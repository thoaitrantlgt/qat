seed: 42

dataset:
  name: cifar10
  root: data
  download: true
  val_split: 0

model:
  name: resnet20

qat:
  weight_bits: 4
  activation_bits: 4
  first_last_bits: 8
  warmup_epochs: 5

training:
  epochs: 200
  batch_size: 128
  num_workers: 0
  device: auto
  log_interval: 100

optimizer:
  name: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: cosine

output:
  checkpoint: outputs/checkpoints/resnet20_cifar10_qat_w4a4_best.pt
  log: outputs/logs/qat_cifar10_resnet20_w4a4.json
