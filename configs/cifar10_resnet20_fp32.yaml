seed: 42

dataset:
  name: cifar10
  root: data
  download: True
  val_split: 0

model:
  name: resnet20

training:
  epochs: 200
  batch_size: 128
  num_workers: 0
  device: auto
  log_interval: 100

optimizer:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  name: cosine

output:
  checkpoint: outputs/checkpoints/resnet20_cifar10_fp32_best.pt
  log: outputs/logs/fp32_cifar10_resnet20.json
