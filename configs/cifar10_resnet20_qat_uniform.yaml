seed: 42

dataset:
  name: cifar10
  root: data
  download: true
  val_split: 0

model:
  name: resnet20

qat:
  weight_bits: 8
  activation_bits: 8
  first_last_bits: 8
  warmup_epochs: 5

training:
  epochs: 100
  batch_size: 256
  num_workers: 4
  device: cuda
  log_interval: 100

optimizer:
  name: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: cosine

output:
  checkpoint: outputs/checkpoints/resnet20_cifar10_qat_best.pt
  log: outputs/logs/qat_cifar10_resnet20.json
